# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Rémi Mercier
email: hello@remimercier.com
description: >- # this means to ignore newlines until "baseurl:"
  The blog of Rémi Mercier, Ruby on Rails Developer.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://remimercier.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: mercier_remi
github_username:  merciremi
author: Rémi Mercier

collections:
  fragments:
    output: true
  fr_posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "fragments"
    values:
      permalink: /:title/
  - scope:
      path: "fr"
    values:
      permalink: /fr/:basename/
      lang: fr
  - scope:
      path: "_posts/fr"
      type: "posts"
    values:
      permalink: /fr/:title
      lang: fr

jekyll_compose:
  default_front_matter:
    drafts:
      excerpt:
      date: 2000-01-01
      permalink:
      category:
      cover_image:
      toc: true

toc:
  min_level: 1
  max_level: 3
  ordered_list: true

# Build settings
include: ['_pages', '_data']
kramdown:
  input: GFM
  auto_ids: true
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-paginate
  - jekyll-toc
whitelist:
  - jekyll-redirect-from
paginate: 20
paginate_path: "/blog/page/:num"

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
