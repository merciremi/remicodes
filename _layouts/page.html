---
layout: default
---

<article class="page">
  <section class="page--title">
    {% if page.hide_title != true %}
      <h1>{{ page.title }}</h1>
    {% endif %}
  </section>
  <section class="page--body">
    {{ content }}
  </section>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "{{ site.url }}{{ page.url }}#webpage",
  "name": "{{ page.title | escape }}",
  "url": "{{ site.url }}{{ page.url }}",
  "author": {
    "@id": "{{ site.url }}/#person"
  }
}
</script>
