---
layout: default
---

<article class="post" data-category="{{ page.categories[0] | downcase }}">

  <aside class="post--sidebar s-down-hidden">
    <div class="aside--sticky">
      <div class="aside--toc">
        <h5 class="">Chapters</h5>
        <div class="text-sm">{{ content | toc_only }}</div>
      </div>

      <div class="aside--newsletter">
        {% include newsletter_mailchimp.html %}
      </div>
    </div>
  </aside>

  <div class="post--main">
    <section class="post--title">
      <h1 class="mt-0">{{ page.title }}</h1>
      {% unless page.lang == 'fr' %}
        {% include breadcrumbs.html %}
      {% endunless %}
    </section>

    <section class="post--content">
      {{ content | inject_anchors }}
    </section>
  </div>
</article>



<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "@id": "{{ site.url }}{{ page.url }}#blogposting",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.excerpt | strip_html | truncate: 200 | escape }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    {% if page.last_modified_at %}
    "dateModified": "{{ page.last_modified_at | date_to_xmlschema }}",
    {% else %}
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    {% endif %}
    "author": {
      "@id": "{{ site.url }}/#person"
    },
    "publisher": {
      "@id": "{{ site.url }}/#person"
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ site.url }}{{ page.url }}"
    }
    {% if page.categories %},
    "keywords": [{% for cat in page.categories %}"{{ cat }}"{% unless forloop.last %}, {% endunless %}{% endfor %}]
    {% endif %}
  }
</script>

<script>
  const headings = document.querySelectorAll('.post--content h2[id], .post--content h3[id]');
  const tocLinks = document.querySelectorAll('.aside--toc a');

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      tocLinks.forEach(link => link.closest('li').classList.remove('toc--active'));
      const active = document.querySelector(`.aside--toc a[href="#${entry.target.id}"]`);
      if (active) active.closest('li').classList.add('toc--active');
    });
  }, { rootMargin: '0px 0px -70% 0px' });

  headings.forEach(h => observer.observe(h));
</script>
