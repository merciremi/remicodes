<p>Filed under
  <strong>
    {% assign real_cats = page.categories | where_exp: "cat", "cat != 'other' and cat != ''" %}
    {% if real_cats.size == 0 %}
      <a href="{{ site.baseurl }}/blog">Other</a>
    {% else %}
      {% for cat in real_cats %}
        <a href="{{ site.baseurl }}/series/{{ cat }}">{{ cat | capitalize }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    {% endif %}
  </strong>
</p>
